  - {type: variant, offset: 924, length: 323, content: 時南天竺王甚邪見承事外道毀謗正法。龍樹菩薩為化彼故躬持赤旛在王前行。經歷七年王始怪問。此是何人在我＝吾【宋】【元】我【大】，吾【宋】【元】我吾前行。答曰我是一切智人。王聞是已甚大驚愕而問之言。一切智人曠代不有。汝自言是何以驗之。答言欲知智在說王當見問。王即自念我為智主大論議師。問之能屈猶不足名。一旦不如此非小事。若其不問便是一屈遲疑良久。不得已而問之。天今何為耶。龍樹言天今與阿脩羅戰。王聞此言譬如人噎。既不得吐又不得咽。欲非其言復無以證之。欲是其事無事可明。未言之間龍樹復言。此非虛論求勝之談。王小待之須臾有驗。言訖空中便有干戈兵器相係而落。王言干戈矛戟雖是戰器。汝何必知是天與阿脩羅戰。龍樹言搆之虛言不如校以實事。言已阿脩羅手足指及其耳鼻從空而下。又令王及臣民婆羅門眾。見空中清除兩陣相對。王乃稽首伏其法化。殿上有萬婆羅門。皆棄束髮受成就戒。是時龍樹, 宮: ''}
